services:
  wordpress:
    image: wordpress:php8.2-fpm
    container_name: ${PROJECT_NAME}_wp
    # Run PHP-FPM as the user that owns the bind-mounted ./wordpress so it can WRITE
    # it (uploads, cache, wp-config). start.sh sets WP_USER to that owner; default
    # 33:33 (the image's www-data) keeps stock behavior for a plain `docker compose up`.
    user: "${WP_USER:-33:33}"
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
    volumes:
      - ./wordpress:/var/www/html
    restart: always

  caddy:
    image: caddy:2
    container_name: ${PROJECT_NAME}_caddy
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_HOST: ${SITE_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./wordpress:/var/www/html
      - caddy_data:/data
      - caddy_config:/config
    restart: always

  db:
    image: mysql:5.7
    container_name: ${PROJECT_NAME}_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./db:/var/lib/mysql
    ports:
      - "3306:3306"

  # One-off wp-cli runner. Kept out of `docker compose up -d` via the "cli" profile.
  # Invoke with: docker compose run --rm wpcli wp <command>
  wpcli:
    image: wordpress:cli
    profiles: ["cli"]
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
    volumes:
      - ./wordpress:/var/www/html

volumes:
  caddy_data:
  caddy_config:
